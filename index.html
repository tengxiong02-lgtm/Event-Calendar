<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresno State Events/Clubs</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="main-header">
    <h1>Fresno State Events/Clubs</h1>
    <p>Discover campus events and club activities.</p>
  </header>

  <main class="events-layout">

    <!-- Current Events -->
    <section class="event-column">
      <h2>Current Events</h2>

      <div id="current-events" class="events-container">
        <p class="empty-message">Loading events...</p>
      </div>
    </section>

    <!-- Future Events -->
    <section class="event-column">
      <h2>Future Events</h2>

      <div id="future-events" class="events-container">
        <p class="empty-message">Loading events...</p>
      </div>
    </section>

    <!-- Past Events -->
    <section class="event-column">
      <h2>Past Events</h2>

      <div id="past-events" class="events-container">
        <p class="empty-message">Loading events...</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
