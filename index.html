<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresno State Events/Clubs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Fresno State Events/Clubs</h1>
    <p>Browse campus and club events in one simple feed.</p>
  </header>

  <main class="event-board">
    <section class="event-column">
      <h2>Current Events</h2>
      <div id="current-events" class="event-list">
        <p class="empty-message">No current events yet.</p>
      </div>
    </section>

    <section class="event-column">
      <h2>Future Events</h2>
      <div id="future-events" class="event-list">
        <p class="empty-message">No future events yet.</p>
      </div>
    </section>

    <section class="event-column">
      <h2>Past Events</h2>
      <div id="past-events" class="event-list">
        <p class="empty-message">No past events yet.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
